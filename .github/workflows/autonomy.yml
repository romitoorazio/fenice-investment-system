name: Fenice Autonomous Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

concurrency:
  group: fenice-autonomy
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run autonomous analysis
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: npm run analyze

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit"
            exit 0
          fi
          git config user.name "fenice-autonomy-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-snapshot.json data/history
          git commit -m "Update autonomous market snapshot"
          git push origin main
